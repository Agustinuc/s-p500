name: SP500 Drawdown Monitor

on:
  schedule:
    # Ejecutar lunes a viernes a las 23:00 UTC
    - cron: "0 23 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drawdown script
        run: python syp.py
